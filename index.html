<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Curved Sounds</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --card2:#111827;
    --text:#f8fafc;
    --muted:#94a3b8;
    --cyan:#38bdf8;
    --amber:#f59e0b;
    --green:#10b981;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:radial-gradient(circle at top left,#1e3a5f,#0f172a 45%,#020617);
    color:var(--text);
    padding:40px 20px;
}

.wrap{
    max-width:1000px;
    margin:auto;
}

.header{
    margin-bottom:28px;
}

.badge{
    display:inline-block;
    border:1px solid var(--cyan);
    background:#38bdf822;
    color:#bae6fd;
    padding:8px 14px;
    border-radius:999px;
    font-weight:800;
    font-size:14px;
}

h1{
    font-size:46px;
    margin:18px 0 8px;
    letter-spacing:-1px;
}

.subtitle{
    color:var(--muted);
    font-size:19px;
    line-height:1.5;
}

.beta-notice{
    background:#3f2d00;
    border:1px solid var(--amber);
    color:#fde68a;
    padding:18px;
    border-radius:16px;
    margin:26px 0;
    line-height:1.6;
}

.beta-notice strong{
    color:#fff7cc;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:18px;
    margin-top:24px;
}

.card{
    background:var(--card);
    border:1px solid #334155;
    border-radius:18px;
    padding:22px;
    box-shadow:0 10px 30px #0007;
}

.card h2{
    margin-top:0;
    color:#bae6fd;
}

.card a{
    color:var(--cyan);
    font-size:20px;
    font-weight:800;
    text-decoration:none;
}

.card a:hover{
    text-decoration:underline;
}

.desc{
    color:#cbd5e1;
    margin-top:10px;
    line-height:1.5;
}

.status{
    display:inline-block;
    margin-top:14px;
    padding:5px 9px;
    border-radius:999px;
    background:#064e3b;
    color:#a7f3d0;
    font-size:12px;
    font-weight:800;
}

.status.beta{
    background:#78350f;
    color:#fde68a;
}

.footer{
    color:#64748b;
    margin-top:34px;
    font-size:13px;
    line-height:1.6;
}

.small-note{
    color:#94a3b8;
    font-size:14px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="wrap">

    <div class="header">
        <div class="badge">
